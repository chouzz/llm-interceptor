name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run linting with ruff
        run: uv run ruff check src/

      - name: Run type checking with mypy
        run: uv run mypy src/lli --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
        continue-on-error: true

      - name: Verify CLI works
        run: |
          uv run lli --version
          uv run lli --help

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install Node.js dependencies
        run: npm ci
        working-directory: ui

      - name: Build UI
        run: npm run build
        working-directory: ui

      - name: Build package
        run: uv build

      - name: Verify UI assets in wheel
        run: |
          python - << 'PY'
          import pathlib
          import zipfile

          dist_dir = pathlib.Path("dist")
          wheels = sorted(dist_dir.glob("llm_interceptor-*.whl"))
          if not wheels:
              raise SystemExit("No wheel found in dist/")

          wheel_path = wheels[-1]
          with zipfile.ZipFile(wheel_path) as zf:
              names = zf.namelist()

          required_files = ["lli/static/index.html"]
          missing = [f for f in required_files if f not in names]
          if missing:
              raise SystemExit(f"Missing required UI files in wheel: {missing}")

          if not any(n.startswith("lli/static/assets/") for n in names):
              raise SystemExit("No assets found under lli/static/assets/ in wheel")

          print(f"Verified UI assets present in {wheel_path}")
          PY

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
