name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      test_pypi:
        description: 'Publish to Test PyPI instead of PyPI'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install Node.js dependencies
        run: npm ci
        working-directory: ui

      - name: Build UI
        run: npm run build
        working-directory: ui

      - name: Build package
        run: uv build

      - name: Verify packaged Python modules and UI assets
        run: |
          python - << 'PY'
          import pathlib
          import tarfile
          import zipfile

          dist_dir = pathlib.Path("dist")

          # Check wheel
          wheels = sorted(dist_dir.glob("llm_interceptor-*.whl"))
          if not wheels:
              raise SystemExit("No wheel found in dist/")
          wheel_path = wheels[-1]
          with zipfile.ZipFile(wheel_path) as zf:
              names = zf.namelist()

          # Ensure core Python packages are present
          required_packages = [
              "lli/__init__.py",
              "lli/cli.py",
              "llm_interceptor/__init__.py",
          ]
          missing_pkgs = [f for f in required_packages if f not in names]
          if missing_pkgs:
              raise SystemExit(f"Missing required Python modules in wheel: {missing_pkgs}")

          # Ensure UI assets are present
          required_files = ["lli/static/index.html"]
          missing = [f for f in required_files if f not in names]
          if missing:
              raise SystemExit(f"Missing required UI files in wheel: {missing}")

          if not any(n.startswith("lli/static/assets/") for n in names):
              raise SystemExit("No assets found under lli/static/assets/ in wheel")

          print(f"Verified UI assets present in {wheel_path}")

          # Check sdist (optional but safer)
          sdists = sorted(dist_dir.glob("llm_interceptor-*.tar.gz"))
          if sdists:
              sdist_path = sdists[-1]
              with tarfile.open(sdist_path, "r:gz") as tf:
                  members = [m.name for m in tf.getmembers() if m.isfile()]

              # sdist will usually have a top-level directory prefix
              if not any(name.endswith("src/lli/static/index.html") for name in members):
                  raise SystemExit("sdist does not contain src/lli/static/index.html")

              if not any("src/lli/static/assets/" in name for name in members):
                  raise SystemExit("sdist does not contain src/lli/static/assets/")

              print(f"Verified UI assets present in {sdist_path}")
          PY

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-test-pypi:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.test_pypi == 'true'
    environment:
      name: test-pypi
      url: https://test.pypi.org/project/llm-interceptor/

    permissions:
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.test_pypi == 'false')
    environment:
      name: pypi
      url: https://pypi.org/project/llm-interceptor/

    permissions:
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
